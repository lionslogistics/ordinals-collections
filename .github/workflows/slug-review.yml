name: Slug conflict review

on:
  pull_request:
    paths:
      - collections.json

jobs:
  check-slugs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check slug conflicts
        id: check
        run: |
          BASE_JSON=$(git show origin/${{ github.base_ref }}:collections.json)
          OUTPUT=$(BASE_COLLECTIONS_JSON="$BASE_JSON" node scripts/check-slug-conflicts.js)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: fromJSON(steps.check.outputs.result).found[0] != null
        uses: actions/github-script@v7
        with:
          script: |
            const result = ${{ steps.check.outputs.result }};
            const rows = result.found.map(entry => {
              const legacy = entry.legacyMatch ? '⚠️ Yes' : '—';
              const satflow = entry.satflowMatch
                ? `⚠️ [Yes](${entry.satflowUrl})`
                : '—';
              return `| \`${entry.slug}\` | ${legacy} | ${satflow} |`;
            });

            const body = [
              '## Slug Conflict Check',
              '',
              'The following new slugs conflict with existing listings:',
              '',
              '| Slug | Legacy (Magic Eden) | Satflow |',
              '|------|-------------------|---------|',
              ...rows,
              '',
              '_This is informational only and does not block merging._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Slug Conflict Check')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
